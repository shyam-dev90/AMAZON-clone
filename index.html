<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="navbar">
        <div class="logo-section">
            <img src="images/amazon-icon.png" alt="" class="logo">
        </div>
        <div class="location">
           <img src="images/location-icon.png" alt="" class="location-logo">
            <div>
                <p>Update location</p>
            </div>
        </div>
        <div class="search">
            <div class="search-content">All</div>
            <div><input type="text" placeholder="Search Amazon.in" class="search-bar"></div>
            <div class="search-icon-container"><img src="images/search-icon.png" alt="" class="search-icon"></div>
        </div>
        <div class="language">
            <img src="images/flag-icon.png" alt="" class="flag-icon">
            <div class="language-contant"><p>EN</p></div>
        </div>
        <div class="navbar-right-content">
            <div class="right-content-1"><p>Hello, Sign in</p></div>
            <div class="right-content-2"><p>Account & Lists</p></div>
        </div>
        <div class="navbar-right-content">
            <div class="right-content-1"><p>Returns</p></div>
            <div class="right-content-2"><p>& Orders</p></div>
        </div>
        <div>
            <img src="images/cart image.png" alt="" class="cart-icon">
        </div>
   </div>
   <div class="navbar-2">
        <div>
            <ul class="navbar-2-list">
                <li>
                    <div class="all-list">
                        <img src="images/line symbol.png" alt="" class="lines-icon">
                        <p>All</p>
                    </div>
                </li>
                <li>Fresh</li>
                <li>MX Player</li>
                <li>Sell</li>
                <li>Bestseller</li>
                <li>Mobiles</li>
                <li>Today's Deals</li>
                <li>Customer Service</li>
                <li>New releases</li>
                <li>Prime</li>
                <li>Fashion</li>
                <li>Electronics</li>
                <li>Amazon Play</li>
            </ul>
        </div>
        <div><img src="images/offer image.png" alt="" class="offer-image"></div>
   </div>
        
</body>
</html>
